name: Build & Release APK

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/v}
          echo "VERSION_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          # Convert version to code (e.g., 1.0.3 -> 10003)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG_NAME"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        env:
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
        run: ./gradlew assembleDebug

      - name: Copy APK to output
        run: cp app/build/outputs/apk/debug/app-debug.apk XDownloader-v${{ steps.version.outputs.VERSION_NAME }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: XDownloader-v${{ steps.version.outputs.VERSION_NAME }}
          path: XDownloader-v${{ steps.version.outputs.VERSION_NAME }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: XDownloader-v${{ steps.version.outputs.VERSION_NAME }}.apk
          generate_release_notes: true
